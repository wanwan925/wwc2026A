<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>簡易網頁計算機</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 300px; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        input, select, button { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        #result { font-weight: bold; color: blue; margin-top: 10px; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="container">
    <h3>簡易計算機</h3>
    
    <label for="x">請輸入 x：</label>
    <input type="number" id="x" placeholder="數字 1">

    <label for="opt">選擇運算符：</label>
    <select id="opt">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>

    <label for="y">請輸入 y：</label>
    <input type="number" id="y" placeholder="數字 2">

    <button onclick="calculate()">計算結果</button>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        // 1. 取得輸入值
        const x = parseFloat(document.getElementById('x').value);
        const opt = document.getElementById('opt').value;
        const y = parseFloat(document.getElementById('y').value);
        const resultDiv = document.getElementById('result');

        // 清除舊結果
        resultDiv.className = "";
        resultDiv.innerHTML = "";

        // 2. 邏輯判斷 (對應你的 Python 邏輯)
        if (isNaN(x) || isNaN(y)) {
            resultDiv.innerHTML = "請輸入有效的數字";
            resultDiv.className = "error";
            return;
        }

        if (opt === "/" && y === 0) {
            resultDiv.innerHTML = "除數不能為 0";
            resultDiv.className = "error";
        } else {
            let result;
            // JavaScript 的 switch 相當於 Python 的 match
            switch (opt) {
                case "+": result = x + y; break;
                case "-": result = x - y; break;
                case "*": result = x * y; break;
                case "/": result = x / y; break;
            }
            // 3. 顯示結果 (對應你的 f-string)
            resultDiv.innerHTML = `${x} ${opt} ${y} 的結果是 ${result}`;
        }
    }
</script>

</body>
</html>
